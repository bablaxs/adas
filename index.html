<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login Mockup</title>
<style>
* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}
.socials button img {
  width: 20px;
  height: 20px;
  object-fit: contain;
}
body {
  margin: 0;
  min-height: 115vh;

  background: radial-gradient(circle at center, #071211 0%, #020707 100%);

  color: #333;

  padding-top: 180px; /* było 120px */
  padding-bottom: 80px;

  display: flex;
  flex-direction: column;
  align-items: center;
}
.circle img {
  width: 90px;
  height: 90px;
  object-fit: contain;
}
.circle {
  position: absolute;
  width: 110px;
  height: 110px;
  background: #d6cf8d00;
  border-radius: 50%;
  left: 50%;
  top: -135px;
  transform: translateX(-50%);
  z-index: 10;
}

.card {
  position: relative;
  width: 490px;
  background: white;
  border-radius: 22px;
  padding: 42px 40px 36px;
  box-shadow: 0 0 0 1px #ddd;
}
h1 {
  margin: 0 0 6px;
  font-size: 24px;
  font-weight: 700;
}

.subtitle {
  color: #666;
  font-size: 15px;
  margin-bottom: 28px;
}

.subtitle span {
  margin-left: 14px;
}

label {
  display: block;
  font-size: 15px;
  margin-bottom: 7px;
}

input {
  width: 100%;
  height: 39px;
  border: 1.5px solid #999;
  border-radius: 8px;
  font-size: 18px;
  padding: 0 12px;
  outline: none;
}

input:focus {
  border: 2px solid #0b57d0;
  box-shadow: 0 0 0 2px white, 0 0 0 3px #0b57d0;
}

button.main {
  margin-top: 14px;
  width: 100%;
  height: 46px;
  background: linear-gradient(#182524, #111b1a);
  color: white;
  border: none;
  border-radius: 7px;
  font-size: 15px;
  font-weight: 600;
}

.or {
  display: flex;
  align-items: center;
  gap: 12px;
  color: #777;
  font-size: 14px;
  margin: 24px 32px;
}

.or::before,
.or::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #ddd;
}

.access {
  width: 100%;
  height: 42px;
  border: none;
  border-radius: 7px;
  background: #f0f0f0;
  color: #555;
  font-size: 15px;
}

.socials {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 10px;
}

.socials button {
  height: 44px;
  border: none;
  border-radius: 7px;
  background: #f0f0f0;
  font-size: 24px;
}

.bottom {
  margin-top: 32px;
  font-size: 15px;
}

.bottom a {
  color: #1a73e8;
  text-decoration: none;
  font-weight: 500;
  margin-left: 20px;
}

.help {

  color: #ddd;

  font-size: 13px;

  margin-top: 30px;

}
button.main:hover {

  opacity: 0.9; 

}
.terms {

  color: #aaa;

  font-size: 12px;

  text-align: center;

  width: 100%;

  margin-top: 18px;

  padding: 0 20px;

}
.whatsapp{
    width: 30px !important;

    height: 30px !important;
}
.access img {
    width: 36px;
    height: 36px;
    object-fit: contain;
    vertical-align: middle;
    margin-right: 6px;
}
button.main {
  margin-top: 14px;
  width: 100%;
  height: 46px;
  background: linear-gradient(#182524, #111b1a);
  color: white;
  border: none;
  border-radius: 7px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.arrow {
  opacity: 0;
  transform: translateX(-10px);
  transition: opacity 0.18s ease, transform 0.18s ease;
  font-size: 22px;
  line-height: 1;
}

button.main:hover .arrow {
  opacity: 1;
  transform: translateX(0);
}
@media (max-width: 600px) {
  body {
    min-height: 100vh;
    padding: 130px 16px 40px;
    justify-content: flex-start;
  }

  .card {
    width: 100%;
    max-width: 390px;
    padding: 34px 24px 30px;
    border-radius: 20px;
  }
.circle img {
  width: 70px;
  height:70px;
  object-fit: contain;
}
  .circle {
    width: 85px;
    height: 85px;
    top: -105px;
  }

  h1 {
    font-size: 22px;
  }

  .subtitle {
    font-size: 14px;
    margin-bottom: 24px;
  }

  .subtitle span {
    margin-left: 8px;
  }

  input {
    height: 42px;
    font-size: 16px;
  }

  button.main {
    height: 46px;
    font-size: 14px;
  }

  .access {
    height: 44px;
    font-size: 14px;
  }

  .access img {
    width: 24px;
    height: 24px;
  }

  .socials {
    gap: 8px;
  }

  .socials button {
    height: 42px;
  }

  .bottom {
    font-size: 14px;
    text-align: center;
  }

  .bottom a {
    display: inline-block;
    margin-left: 8px;
  }

  .help {
    margin-top: 28px;
  }

  .terms {
    max-width: 390px;
    font-size: 10px;
    line-height: 1.4;
  }
}
</style>
</head>
<body>


<div class="card">
    <div class="circle"><img src="Logo.png" alt=""></div>
  <h1>Zaloguj się</h1>
  <div class="subtitle">Przejdź do: Shopify account</div>

  <label for="email">E-mail</label>
  <input id="email" type="text" autocomplete="off">

 <button class="main">
  Kontynuuj za pomocą adresu e-mail
  <span class="arrow">➞</span>
</button>

  <div class="or">lub</div>

  <button class="access"><img src="guy.png" alt=""> Zaloguj się za pomocą klucza dostępu</button>

  <div class="socials">
    <button><img src="google.png" alt=""></button>
    <button></button>
    <button><img src="facebook.png" alt=""></button>
    <button><img src="whatsapp.png" class="whatsapp" alt=""></button>
  </div>

  <div class="bottom">
    Pierwszy raz w Shopify?
    <a href="#">Rozpocznij ➞</a>
  </div>
</div>

<div class="help">Potrzebujesz pomocy?</div>
<div class="terms">
 Kontynuując, akceptujesz Warunki i Polityka prywatności oraz wyrażasz zgodę na otrzymywanie e-maili marketingowych od Shopify. W każdej chwili możesz zrezygnować z subskrypcji.
</div>

</body>
</html>
